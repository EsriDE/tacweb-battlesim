  <body class="calcite-mode-dark">
    <arcgis-map basemap="gray-vector" zoom="6" center="30,50">
      
      <arcgis-zoom slot="top-left"></arcgis-zoom>

      <arcgis-expand slot="top-left" expanded>
        <arcgis-bookmarks></arcgis-bookmarks>
      </arcgis-expand>
      
      <arcgis-expand slot="top-right" icon="list">
        <div style="width:300px;">
          <calcite-panel heading="Combat Log">
            <div id="combatList"></div>
          </calcite-panel>
        </div>
      </arcgis-expand>

        gap:8px; 
        align-items:center; 
        background:#2b2b2b;
        padding:8px;
        border-radius:6px;">

          id="timeSlider"
          layout="compact"
          mode="time-window"
          play-rate="1000">
        </arcgis-time-slider>

        <calcite-button
          id="resetTimeBtn"
          appearance="outline"
          scale="s"
          icon-start="reset">
        </calcite-button>

    <script>
      const combatList = document.getElementById("combatList");
      let combatEvents = [];
          
      function clearCombatPanel() {
        combatList.innerHTML = "";
      }
      
      function deduplicateEvents(events) {
        const seen = new Set();

        return events.filter(e => {
          const key = `${e.target.unit_id}_${e.target.dtg}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }
      
      function filterEventsByTime(events, currentTime) {
        return events.filter(e => e.target.dtg <= currentTime);
      }

      function jumpToUnit(target, mapElement) {
        //console.log("Jump to:", target.lon, target.lat);

        mapElement.view.goTo({
          center: [target.lon, target.lat],
          zoom: 12
        });
      }

      function updateCombatPanel(mapElement, currentTime) {
        if (!combatEvents || combatEvents.length === 0) return;

        filterEventsByTime(deduplicateEvents(combatEvents), currentTime).forEach(e => {

          if (e.type === "kill") {

            /*
            const attackers = e.attackers
              .map(a => a.unit || `Unit ${a.unit_id}`)
              .join(", ");
            */

            const item = document.createElement("div");

            item.style.padding = "6px";
            item.style.marginBottom = "6px";
            item.style.borderBottom = "1px solid #555";          
            item.style.cursor = "pointer";

            // Team Farbe
            const color = e.target.country === "ru" ? "#ff6666" : "#66ff66";

            item.innerHTML = `
              <strong style="color:${color}">
                💀 ${e.target.country} ${e.target.unit} Unit: ${e.target.unit_id}
              </strong><br>
              <small>${new Date(e.target.dtg).toISOString()} Attackers: ${e.attackerCount}</small>
            `;

            // CLICK → MAP JUMP
            item.addEventListener("click", () => {
              jumpToUnit(e.target, mapElement);
            });

            // NEUE EVENTS OBEN
            combatList.prepend(item);
          }
        });
      }
    </script>

      // Set time slider properties – same pattern as the sample code
      let minTime = 1778255735670;
      let startDate = new Date(minTime);
      // Define endDate 24h after startDate to ensure slider functionality even if all timestamps are identical
      const MINUTE = 60 * 1000;
      let endDate = new Date(startDate.getTime() + (24 * 60 - 3) * MINUTE); // 24 hours - 3 min later
      
      const playRate = 1000;
      timeSlider.fullTimeExtent = { start: startDate, end: endDate };
      timeSlider.stops = { interval: { value: 2, unit: "minutes" } };
      timeSlider.playRate = playRate;
      timeSlider.mode = "time-window";
      //timeSlider.mode = "instant";

      //console.log(`Time slider extent: ${startDate.toISOString()} -> ${endDate.toISOString()}`);

      const resetBtn = document.getElementById("resetTimeBtn");
      resetBtn.addEventListener("click", () => {
        const fullExtent = timeSlider.fullTimeExtent;

        // stoppt Animation
        timeSlider.stop();

        // setzt auf Anfang
        timeSlider.fullTimeExtent = fullExtent;
        timeSlider.stops = { interval: { value: 2, unit: "minutes" } };
        timeSlider.playRate = playRate;
        timeSlider.mode = "time-window";

        // Combat model reset
        const currentTime = fullExtent.start.getTime();
        combatModel.reset();
        clearCombatPanel();
        updateCombatPanel(mapElement, currentTime);
      });

      // Combat Model
      import { CombatModel } from "./combatModel.js";
      const combatModel = new CombatModel(unitUniqueValLayer);
      
      let lastTime = null;
      setInterval(async () => {
        const extent = timeSlider.timeExtent;

        if (!extent?.start) return;

        const currentTime = extent.start.getTime();

        if (currentTime === lastTime) return;
        //console.log(extent.start.toISOString() + "-" + extent.end.toISOString());

        if (lastTime !== null && currentTime < lastTime) {
            //console.log("Time moved backwards → reset");
            combatModel.reset();
            clearCombatPanel();
            updateCombatPanel(mapElement, currentTime);
        }

        lastTime = currentTime;

        //console.log("Time changed:", new Date(currentTime));


        const events = await combatModel.update(extent);        
        if (events && events.length > 0) {
          combatEvents.push(...events);
          updateCombatPanel(mapElement, currentTime);
          //console.log(new Date(currentTime));
        }
